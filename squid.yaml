manifest_version: subsquid.io/v0.1
name: 0xmarkets-base-sepolia
version: 1
description: 0xMarkets indexer for Base Sepolia testnet

build:
  cmd:
    - npm ci
    - npx squid-typeorm-codegen
    - npx squid-evm-typegen src/abi ./abi/*.json --multicall
    - tsc

deploy:
  addons:
    postgres:
  processor:
    cmd: ["node", "lib/main.js"]
  api:
    cmd: ["npx", "squid-graphql-server"]

scale:
  dedicated: false
